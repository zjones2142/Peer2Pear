# =============================================================================
# Peer2Pear — Windows Build & Release Workflow
# =============================================================================
#
# Triggered by pushes to the Release branch (or manually via workflow_dispatch).
#
# BRANCH PROTECTION — REQUIRED MANUAL SETUP
# ------------------------------------------
# Before relying on this workflow configure the following in:
#   GitHub → Repository Settings → Branches → Add branch ruleset
#
# Recommended settings for the "Release" branch:
#   • Target branches: Release
#   • Restrict who can push to matching branches (no direct pushes)
#   • Require a pull request before merging (source branch: main)
#   • Required approvals: 1+
#   • Do not allow bypassing the above settings
#
# =============================================================================

name: Build and Release

on:
  push:
    branches:
      - Release
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # GUARD: reject any push that did not originate from the main branch.
  # This is a best-effort check inside the workflow.  The authoritative
  # restriction is the branch-protection ruleset described above.
  # ---------------------------------------------------------------------------
  merge-guard:
    name: Verify source is main
    runs-on: ubuntu-latest
    permissions:
      contents: read        # Read commit/PR metadata via the GitHub API
      pull-requests: read   # Look up pull requests associated with the commit
    steps:
      - name: Check that the merge came from main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          SHA:      ${{ github.sha }}
        run: |
          # workflow_dispatch pushes are always allowed (manual trigger)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — skipping merge-guard."
            exit 0
          fi
          # Look for a merged PR targeting Release whose head is main
          RESULT=$(gh api \
            "repos/${REPO}/commits/${SHA}/pulls" \
            --jq '[.[] | select(.base.ref=="Release" and .head.ref=="main" and .merged_at!=null)] | length')
          if [ "$RESULT" -lt 1 ]; then
            echo "::error::This push to Release did not come from an approved PR from main. Aborting."
            exit 1
          fi
          echo "Merge guard passed — source branch is main."

  # ---------------------------------------------------------------------------
  # BUILD: compile the project on Windows, stage the runtime, and publish.
  # ---------------------------------------------------------------------------
  build-and-release:
    name: Build (Windows) and publish release
    needs: merge-guard
    runs-on: windows-latest

    permissions:
      contents: write   # Required to create/update GitHub Releases
      actions: write    # Required for the vcpkg GHA binary cache

    env:
      # Tell vcpkg to use GitHub Actions' built-in cache as the binary cache
      # backend.  Packages that haven't changed are restored instead of
      # recompiled, eliminating the 30-45 min cold-build penalty on every push.
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. vcpkg binary cache – expose GHA cache credentials to vcpkg ────────
      - name: Export GitHub Actions cache environment variables for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL',    process.env.ACTIONS_CACHE_URL    || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # ── 3. Qt (cached between runs) ──────────────────────────────────────────
      - name: Install Qt 6.7.3 (MSVC x64)
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.7.3'
          target:  'desktop'
          arch:    'win64_msvc2019_64'
          cache:   true

      # ── 4. MSVC compiler environment (required for Ninja + cl.exe) ───────────
      - name: Set up MSVC x64 environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── 5. vcpkg toolchain ───────────────────────────────────────────────────
      # Clone and bootstrap vcpkg (mirrors what winsetup.bat does locally).
      # On subsequent runs vcpkg restores pre-built package binaries from the
      # GHA cache set up above instead of recompiling them.
      - name: Bootstrap vcpkg
        working-directory: Peer2Pear_QtProj
        shell: cmd
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          call .\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      # ── 6. Build ─────────────────────────────────────────────────────────────
      # CMake configure triggers vcpkg manifest install (libsodium, libnice,
      # glib).  On the first run packages are compiled and stored in the GHA
      # cache; subsequent runs restore the pre-built binaries.
      - name: Configure CMake
        working-directory: Peer2Pear_QtProj
        run: cmake --preset vcpkg-default -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: Peer2Pear_QtProj
        run: cmake --build build --config Release --parallel

      # ── 7. Assemble release staging folder ───────────────────────────────────
      # The Ninja single-config generator places the binary directly under the
      # binaryDir (build/), not in a Release/ subdirectory.
      - name: Create staging directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path staging | Out-Null

      - name: Copy executable
        shell: pwsh
        run: Copy-Item "Peer2Pear_QtProj\build\Peer2Pear_QtProj.exe" staging\

      # windeployqt walks the PE import table and copies every Qt DLL, plugin,
      # and QML module that the executable actually uses.
      - name: Deploy Qt DLLs with windeployqt
        shell: pwsh
        run: windeployqt --release --no-translations staging\Peer2Pear_QtProj.exe

      # Copy the runtime DLLs produced by vcpkg (libsodium, libnice, glib, …).
      # vcpkg places them in vcpkg_installed/<triplet>/bin/ inside the CMake
      # build directory when using the manifest + CMake toolchain integration.
      - name: Copy vcpkg runtime DLLs
        shell: pwsh
        run: |
          $vcpkgBin = "Peer2Pear_QtProj\build\vcpkg_installed\x64-windows\bin"
          if (Test-Path $vcpkgBin) {
            Get-ChildItem $vcpkgBin -Filter "*.dll" |
              Copy-Item -Destination staging\
          } else {
            Write-Warning "vcpkg bin dir not found at: $vcpkgBin"
          }

      # ── 8. Collect licenses ───────────────────────────────────────────────────
      # Every vcpkg port ships a 'copyright' file under share/<package>/copyright.
      # Qt ships LICENSE* files at the arch install root.
      - name: Collect licenses
        shell: pwsh
        run: |
          $licenseDir = "staging\licenses"
          New-Item -ItemType Directory -Force -Path $licenseDir | Out-Null

          # --- vcpkg package licenses ---
          $shareDir = "Peer2Pear_QtProj\build\vcpkg_installed\x64-windows\share"
          if (Test-Path $shareDir) {
            Get-ChildItem $shareDir -Directory | ForEach-Object {
              $copyright = Join-Path $_.FullName "copyright"
              if (Test-Path $copyright) {
                Copy-Item $copyright "$licenseDir\$($_.Name).txt"
              }
            }
          }

          # --- Qt licenses ---
          # Use qmake -query to locate the Qt install prefix reliably,
          # matching the same approach used in the Linux workflow.
          $qtPrefix = & qmake -query QT_INSTALL_PREFIX 2>$null
          if ($qtPrefix) {
            Get-ChildItem $qtPrefix -Filter "LICENSE*" | ForEach-Object {
              Copy-Item $_.FullName "$licenseDir\Qt_$($_.Name)"
            }
          }

      # ── 9. Package ───────────────────────────────────────────────────────────
      - name: Create release ZIP
        shell: pwsh
        run: Compress-Archive -Path "staging\*" -DestinationPath "Peer2Pear-Windows-Release.zip"

      # ── 10. Read version & publish GitHub Release ─────────────────────────────
      # Expected CMakeLists.txt format:
      #   project(Peer2Pear_QtProj VERSION 0.1 LANGUAGES CXX)
      # Both the Windows and Linux workflows use the same tag so their artifacts
      # land in the same GitHub Release.
      - name: Read version from CMakeLists.txt
        id: version
        shell: pwsh
        run: |
          $content = Get-Content Peer2Pear_QtProj\CMakeLists.txt -Raw
          $match   = [regex]::Match($content, 'project\s*\([^)]*VERSION\s+([\d]+(?:\.[\d]+)*)')
          if ($match.Success) {
            $ver = $match.Groups[1].Value
          } else {
            Write-Warning "Could not parse VERSION from CMakeLists.txt — defaulting to 0.0"
            $ver = "0.0"
          }
          $tag = "v$ver-build-${{ github.run_number }}"
          echo "tag=$tag"   >> $env:GITHUB_OUTPUT
          echo "label=v$ver (build ${{ github.run_number }})" >> $env:GITHUB_OUTPUT

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ steps.version.outputs.tag }}
          name:                   "Peer2Pear ${{ steps.version.outputs.label }}"
          generate_release_notes: true
          files:                  Peer2Pear-Windows-Release.zip
